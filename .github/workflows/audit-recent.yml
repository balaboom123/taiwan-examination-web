name: audit-recent

on:
  workflow_dispatch:
  schedule:
    - cron: "45 3 1 * *"

permissions:
  contents: write

concurrency:
  group: audit-recent-${{ github.ref }}
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache mirror directory
        uses: actions/cache@v4
        with:
          path: mirror
          key: moex-mirror-${{ hashFiles('data/providers/moex/source-manifest.json') }}
          restore-keys: |
            moex-mirror-

      - name: Inspect release coverage
        id: release_state
        env:
          GH_TOKEN: ${{ github.token }}
        run: python .github/scripts/release_assets.py coverage

      - name: Fail unsupported hosted bootstrap
        if: steps.release_state.outputs.bootstrap_required == 'true'
        run: |
          echo "Hosted bootstrap is unsupported on GitHub-hosted runners."
          echo "Repair the release from a machine with persistent MOEX state, then rerun this workflow."
          exit 1

      - name: Run recent audit
        run: python -m app sync-incremental --provider moex --years 2 --write-manifest --manifest data/providers/moex/source-manifest.json --download-affected-bundles --publish-plan-output .tmp/site-publish-plan.json --bundle-dir bundles/sites/default

      - name: Publish default site
        run: python -m app publish-site --site-id default --repository "${{ github.repository }}" --publish-plan .tmp/site-publish-plan.json

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: python .github/scripts/release_assets.py ensure

      - name: Upload downloadable bundles
        env:
          GH_TOKEN: ${{ github.token }}
        run: python .github/scripts/release_assets.py upload

      - name: Remove stale release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: python .github/scripts/release_assets.py prune

      - name: Sync LootLabs links
        env:
          LOOTLABS_API_KEY: ${{ secrets.LOOTLABS_API_KEY }}
          LOOTLABS_TIER_ID: "1"
          LOOTLABS_NUMBER_OF_TASKS: "1"
          LOOTLABS_THEME: "1"
        run: python -m app sync-lootlabs --site-id default

      - name: Commit audited data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "chore: audit recent downloadable bundles"
          git push
