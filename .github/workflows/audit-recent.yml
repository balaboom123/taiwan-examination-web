name: audit-recent

on:
  workflow_dispatch:
  schedule:
    - cron: "45 3 1 * *"

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache mirror directory
        uses: actions/cache@v4
        with:
          path: mirror
          key: moex-mirror-${{ hashFiles('data/source-manifest.json') }}
          restore-keys: |
            moex-mirror-

      - name: Inspect release coverage
        id: release_state
        env:
          GH_TOKEN: ${{ github.token }}
        run: python .github/scripts/release_assets.py coverage

      - name: Run bootstrap full sync
        if: steps.release_state.outputs.bootstrap_required == 'true'
        run: python -m app sync-full --write-manifest

      - name: Run recent audit
        if: steps.release_state.outputs.bootstrap_required != 'true'
        run: python -m app sync-incremental --years 2 --write-manifest

      - name: Publish default site
        run: python -m app publish-site --site-id default --repository "${{ github.repository }}"

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: python .github/scripts/release_assets.py ensure

      - name: Upload downloadable bundles
        env:
          GH_TOKEN: ${{ github.token }}
        run: python .github/scripts/release_assets.py upload

      - name: Remove stale release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: python .github/scripts/release_assets.py prune

      - name: Sync LootLabs links
        env:
          LOOTLABS_API_KEY: ${{ secrets.LOOTLABS_API_KEY }}
          LOOTLABS_TIER_ID: "1"
          LOOTLABS_NUMBER_OF_TASKS: "1"
          LOOTLABS_THEME: "1"
        run: python -m app sync-lootlabs --site-id default

      - name: Commit audited data and site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git add -f site
          git diff --cached --quiet || git commit -m "chore: audit recent downloadable bundles"
          git push
