name: audit-recent

on:
  workflow_dispatch:
  schedule:
    - cron: "45 3 1 * *"

permissions:
  contents: write

env:
  MOEX_RELEASE_TAG: moex-bundles

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache mirror directory
        uses: actions/cache@v4
        with:
          path: mirror
          key: moex-mirror-${{ hashFiles('data/source-manifest.json') }}
          restore-keys: |
            moex-mirror-

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: python .github/scripts/release_assets.py ensure

      - name: Inspect release coverage
        id: release_state
        env:
          GH_TOKEN: ${{ github.token }}
        run: python .github/scripts/release_assets.py coverage

      - name: Download existing bundles
        if: steps.release_state.outputs.bootstrap_required != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p bundles
          asset_count=$(gh release view "$MOEX_RELEASE_TAG" --json assets --jq '.assets | map(select(.name | endswith(".zip"))) | length')
          if [ "$asset_count" -gt 0 ]; then
            gh release download "$MOEX_RELEASE_TAG" --pattern "*.zip" --dir bundles
          fi

      - name: Run bootstrap full sync
        if: steps.release_state.outputs.bootstrap_required == 'true'
        run: >
          python -m app sync-full
          --write-manifest
          --bundle-base-url "https://github.com/${{ github.repository }}/releases/download/${{ env.MOEX_RELEASE_TAG }}"

      - name: Run recent audit
        if: steps.release_state.outputs.bootstrap_required != 'true'
        run: >
          python -m app sync-incremental --years 2
          --write-manifest
          --bundle-base-url "https://github.com/${{ github.repository }}/releases/download/${{ env.MOEX_RELEASE_TAG }}"

      - name: Upload downloadable bundles
        env:
          GH_TOKEN: ${{ github.token }}
        run: python .github/scripts/release_assets.py upload

      - name: Remove stale release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: python .github/scripts/release_assets.py prune

      - name: Commit audited data and site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git add -f site
          git diff --cached --quiet || git commit -m "chore: audit recent downloadable bundles"
          git push
