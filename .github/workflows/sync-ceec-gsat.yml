name: sync-ceec-gsat

on:
  workflow_dispatch:
  schedule:
    - cron: "20 3 * * 6"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache mirror directory
        uses: actions/cache@v4
        with:
          path: mirror
          key: ceec-gsat-mirror-${{ hashFiles('data/providers/ceec_gsat/source-manifest.json') }}
          restore-keys: |
            ceec-gsat-mirror-

      - name: Run CEEC GSAT sync
        run: python -m app sync-full --provider ceec_gsat --site-id default

      - name: Commit regenerated CEEC GSAT provider data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "chore: refresh CEEC GSAT provider data"
          git push
