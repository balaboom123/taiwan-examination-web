name: sync-wdasec-skill

on:
  workflow_dispatch:
  schedule:
    - cron: "40 3 * * 6"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache mirror directory
        uses: actions/cache@v4
        with:
          path: mirror
          key: wdasec-skill-mirror-${{ hashFiles('data/providers/wdasec_skill/source-manifest.json') }}
          restore-keys: |
            wdasec-skill-mirror-

      - name: Run wdasec_skill sync
        run: python -m app sync-full --provider wdasec_skill --site-id default

      - name: Commit regenerated wdasec_skill provider data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "chore: refresh wdasec_skill provider data"
          git push
