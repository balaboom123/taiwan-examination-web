name: sync-full

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  MOEX_RELEASE_TAG: moex-bundles

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache mirror directory
        uses: actions/cache@v4
        with:
          path: mirror
          key: moex-mirror-${{ hashFiles('data/source-manifest.json') }}
          restore-keys: |
            moex-mirror-

      - name: Run full sync
        run: >
          python -m app sync-full
          --write-manifest
          --bundle-base-url "https://github.com/${{ github.repository }}/releases/download/${{ env.MOEX_RELEASE_TAG }}"

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$MOEX_RELEASE_TAG" >/dev/null 2>&1 || \
          gh release create "$MOEX_RELEASE_TAG" --title "MOEX downloadable bundles" --notes "Human-friendly exam bundles with compatibility aliases"

      - name: Upload downloadable bundles
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          tag = "moex-bundles"
          assets = json.loads(Path("data/release-assets.json").read_text(encoding="utf-8"))
          missing = []
          for asset in assets:
              local_path = Path(asset["storage_key"])
              if not local_path.exists():
                  missing.append(str(local_path))
                  continue
              spec = f"{local_path}#{asset['asset_name']}"
              subprocess.run(["gh", "release", "upload", tag, spec, "--clobber"], check=True)
          if missing:
              raise SystemExit("Missing expected bundle files before upload:\n" + "\n".join(missing))
          PY

      - name: Remove stale release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          tag = "moex-bundles"
          desired = {asset["asset_name"] for asset in json.loads(Path("data/release-assets.json").read_text(encoding="utf-8"))}
          current = json.loads(subprocess.check_output(["gh", "release", "view", tag, "--json", "assets"], text=True))
          for asset in current.get("assets", []):
              if asset["name"].endswith(".zip") and asset["name"] not in desired:
                  subprocess.run(["gh", "release", "delete-asset", tag, asset["name"], "--yes"], check=True)
          PY

      - name: Commit regenerated data and site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data site
          git diff --cached --quiet || git commit -m "chore: refresh downloadable exam bundles"
          git push
