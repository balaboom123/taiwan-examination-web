name: sync-moea-recruit

on:
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * 6"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache mirror directory
        uses: actions/cache@v4
        with:
          path: mirror
          key: moea-recruit-mirror-${{ hashFiles('data/providers/moea_recruit/source-manifest.json') }}
          restore-keys: |
            moea-recruit-mirror-

      - name: Run MOEA Recruit sync
        run: python -m app sync-full --provider moea_recruit --site-id default

      - name: Commit regenerated MOEA Recruit provider data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "chore: refresh MOEA Recruit provider data"
          git push
