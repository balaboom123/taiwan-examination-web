name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - frontend/**
      - data/sites/default/bundles.json
      - data/sites/default/lootlabs-links.json
      - .github/workflows/deploy-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Sync LootLabs links
        env:
          LOOTLABS_API_KEY: ${{ secrets.LOOTLABS_API_KEY }}
          LOOTLABS_TIER_ID: "1"
          LOOTLABS_NUMBER_OF_TASKS: "1"
          LOOTLABS_THEME: "1"
        run: python -m app sync-lootlabs --site-id default
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_ENABLE_ADSENSE: "false"
          VITE_ENABLE_LOOTLABS_GATING: "true"
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: frontend/dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
