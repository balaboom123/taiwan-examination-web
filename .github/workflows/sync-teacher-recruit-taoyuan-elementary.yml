name: sync-teacher-recruit-taoyuan-elementary

on:
  workflow_dispatch:
  schedule:
    - cron: "5 6 * * 2"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: sync-teacher-recruit-taoyuan-elementary
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache mirror directory
        uses: actions/cache@v4
        with:
          path: mirror
          key: teacher-recruit-taoyuan-elementary-mirror-${{ hashFiles('data/providers/teacher_recruit_taoyuan_elementary/source-manifest.json') }}
          restore-keys: |
            teacher-recruit-taoyuan-elementary-mirror-

      - name: Run Taoyuan elementary teacher recruitment sync
        run: python -m app sync-full --provider teacher_recruit_taoyuan_elementary --site-id default

      - name: Commit regenerated Taoyuan elementary teacher recruitment provider data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "chore: refresh Taoyuan teacher recruitment provider data"
          git push
