name: sync-hakka-cert

on:
  workflow_dispatch:
  schedule:
    - cron: "55 5 * * 3"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: sync-hakka-cert
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache mirror directory
        uses: actions/cache@v4
        with:
          path: mirror
          key: hakka-cert-mirror-${{ hashFiles('data/providers/hakka_cert/source-manifest.json') }}
          restore-keys: |
            hakka-cert-mirror-

      - name: Run Hakka cert sync
        run: python -m app sync-full --provider hakka_cert --site-id default

      - name: Commit regenerated Hakka cert provider data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "chore: refresh Hakka cert provider data"
          git push
